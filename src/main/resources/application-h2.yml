spring:
  datasource:
    url: jdbc:h2:mem:membership;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      # create-drop: schema is generated from entities on startup and dropped on shutdown.
      ddl-auto: create-drop
    # SQL logging off by default (kept quiet for demos). To inspect queries, set
    # show-sql: true or raise logging.level.org.hibernate.SQL to DEBUG.
    show-sql: false
    # Ensure data.sql seed runs AFTER Hibernate has created the schema.
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  h2:
    console:
      enabled: true
      path: /h2-console
